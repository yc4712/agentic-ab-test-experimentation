name: Integration Smoke Test

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Skip notice if secret is missing
        if: ${{ env.OPENAI_API_KEY == '' }}
        run: echo "OPENAI_API_KEY is not set, skipping integration test."

      - name: Run demo pipeline
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: python -m src.run_demo

      - name: Upload outputs
        if: ${{ env.OPENAI_API_KEY != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: agentic-ab-demo-output
          path: |
            artifacts/**
            plots/**
